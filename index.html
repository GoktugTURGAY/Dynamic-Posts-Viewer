<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Fetch User Data</title>
    <style>
      *,
      :before,
      :after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --dark-clr: #333;
        --primary-clr: #e61515;
      }

      html {
        font-size: 62.5%; /* 1REM = 10PX */
      }

      body {
        font:
          1.6rem / 1.5 'Inter',
          Arial,
          Helvetica,
          sans-serif;
        color: var(--dark-clr);
      }

      li {
        list-style-type: none;
      }

      button {
        border: none;
        cursor: pointer;
        background-color: transparent;
      }

      a {
        color: inherit;
        display: inline-block;
      }

      .wrapper {
        max-width: 70rem;
        margin: 5rem auto;
        padding: 0 2.6rem;
        text-align: center;
      }

      .page-heading {
        font-size: 5rem;
        line-height: 1;
        color: #fff;
        position: relative;
        width: max-content;
        padding: 5px 14px;
        margin: 0 auto 2rem;
      }

      .page-heading:before {
        content: '';
        position: absolute;
        inset: 0;
        background-color: var(--primary-clr);
        z-index: -1;
        padding: 1rem 0;
        transform: skew(-15deg);
      }

      .page-info {
        font-size: 2rem;
        font-weight: bold;
      }

      .pagination {
        width: max-content;
        margin: 2.6rem auto 3.6rem;
      }

      .pagination-list {
        display: flex;
        gap: 1.2rem;
      }

      .pagination-btn {
        font-size: 1.6rem;
        height: 5rem;
        aspect-ratio: 1;
        border-radius: 50%;
        background-color: var(--dark-clr);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        display: flex;
      }

      .pagination-btn.active {
        background-color: var(--primary-clr);
      }

      .pagination-btn:disabled {
        background-color: #ddd;
        pointer-events: none;
      }

      .posts-inner-wrapper {
        position: relative;
      }

      .posts {
        background-color: #fff6f6;
        padding: 4rem;
        display: flex;
        flex-direction: column;
        gap: 4.6rem;
        height: 60rem;
        overflow-y: scroll;
      }

      .post {
        padding: 1.2rem;
      }

      .post-heading {
        font-size: 3rem;
        margin-bottom: 1.2rem;
      }

      .post-text {
        font-size: 1.8rem;
        line-height: 1.8;
        margin-bottom: 2rem;
      }

      .post-views {
        font-size: 1.8rem;
        margin-bottom: 1.4rem;
      }

      .post-reactions {
        font-size: 1.8rem;
        display: flex;
        justify-content: center;
        gap: 1.2rem;
      }

      .fa-eye,
      .fa-thumbs-down,
      .fa-thumbs-up {
        margin-right: 0.6rem;
      }

      .fa-thumbs-up {
        color: #00ad00;
      }

      .fa-thumbs-down {
        color: var(--primary-clr);
      }

      .loading {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        margin-top: 4rem;
      }

      .loading-animation {
        display: inline-block;
        height: 6rem;
        aspect-ratio: 1;
        background-color: #021cff;
        border-radius: 100%;
        animation: pulse 0.4s infinite alternate ease-in-out;
      }

      .loading-text {
        font-size: 3rem;
        margin-left: 1.4rem;
      }

      .hidden {
        display: none;
      }

      .failed-message {
        font-size: 4rem;
      }

      @keyframes pulse {
        0% {
          opacity: 0;
        }

        100% {
          transform: scale(1.3);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <div class="wrapper">
          <header class="page-header">
            <h1 class="page-heading">Posts</h1>
            <p class="page-info" aria-live="polite">Page: 1</p>
          </header>

          <nav class="pagination" aria-label="posts pagination">
            <ul class="pagination-list">
              <li>
                <button
                  class="pagination-btn btn-previous"
                  type="button"
                  aria-label="previous page"
                  disabled
                >
                  <i class="fa fa-chevron-left" aria-hidden="true"></i>
                </button>
              </li>
              <li>
                <button
                  class="pagination-btn active"
                  type="button"
                  aria-current="page"
                >
                  1
                </button>
              </li>
              <li>
                <button class="pagination-btn" type="button">2</button>
              </li>
              <li>
                <button class="pagination-btn" type="button">3</button>
              </li>
              <li>
                <button class="pagination-btn" type="button">4</button>
              </li>
              <li>
                <button class="pagination-btn" type="button">5</button>
              </li>
              <li>
                <button class="pagination-btn" type="button">6</button>
              </li>
              <li>
                <button
                  class="pagination-btn btn-next"
                  type="button"
                  aria-label="next page"
                >
                  <i class="fa fa-chevron-right" aria-hidden="true"></i>
                </button>
              </li>
            </ul>
          </nav>

          <div class="posts-inner-wrapper">
            <div class="loading" aria-label="loading">
              <span class="loading-animation"></span>
              <p class="loading-text">Loading...</p>
            </div>
            <ul class="posts" aria-label="Posts list" aria-live="polite">
              <!-- JavaScript will inject the markup. -->
            </ul>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
